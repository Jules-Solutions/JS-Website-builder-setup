# Expected detection + bootstrap output for the `has-AI-output` fixture.

# --- Hook output (Captain C) ---
entry_mode: has-AI-output
detection_confidence: high
detection_signals:
  empty_or_near_empty: false
  has_stack_config: false           # no next.config / astro.config / etc.
  has_framework_in_package_json: false
  has_framer_dir: false
  has_figma_file: false
  has_html_artifact: true           # exactly one .html file at root
  html_artifact_count: 1
  ai_output_signature: true         # filename hint + Tailwind class density + inline styles
  detected_signals:
    - filename_hint                 # filename "claude-landing.html" matches AI-output hint list
    - tailwind_utility_classes      # ≥10 distinct utility classes
    - jsx_classname_attribute       # className= (not class=) → React-source provenance
    - inline_style_with_css_vars    # <style> with custom properties

# --- Downstream routing ---
next_phase: 6.5                    # ingest the artifact before continuing
runs_phase_6_5_at_start: true
phase_6_5_extractors:
  - ai-output                      # primary parser per extraction/ai-output.md
ingestion_targets:
  - brand.yaml.tokens              # extract palette + type from inline styles
  - content/pages/{slug}.md        # extract page prose
  - content/strings/en.json        # extract microcopy ("Get the newsletter", etc.)
  - components.yaml                # extract component shapes (Hero, Manifesto, Subscribe)

# --- Bootstrap output (Captain D) — .website-builder/ initialization ---
website_builder_dir_created: true
project_yaml_assertions:
  entry_mode: has-AI-output
  current_phase: 0                 # bootstrap pre-phase
  stack: null                      # NOT pre-detected — AI output is stack-agnostic;
                                   # user picks at phase 11
  stack_pre_detected: false
  cms: null
  languages: null

# --- Files / dirs that MUST exist after bootstrap ---
required_paths:
  - .website-builder/
  - .website-builder/project.yaml
  - .website-builder/README.md
  - .gitignore

# --- Files / dirs that MUST NOT exist after bootstrap ---
forbidden_paths:
  - .website-builder/brand.yaml             # populated by phase 6.5 ingest
  - .website-builder/sitemap.yaml           # same
  - .website-builder/components.yaml        # same
