# tests/commerce-adapters/stripe/fixture/brand.yaml
# Minimal brand baseline for the Stripe fixture. Same shape as cms-adapters
# fixture baseline. Layer 1 (design tokens) per DESIGN-content-layers.md.

name: Still Humans
domain: stillhumans.example.ch

tokens:
  colors:
    primary: oklch(64% 0.18 30)         # warm orange — knowledge-worker brand
    primary_foreground: oklch(98% 0 0)
    background: oklch(100% 0 0)
    foreground: oklch(15% 0 0)
    semantic_error: oklch(60% 0.20 25)
    semantic_success: oklch(60% 0.15 145)
    border: oklch(90% 0.005 30)

  typography:
    display: "Fraunces, serif"
    body: "Inter, sans-serif"
    scale:
      h1: { size: 56px, lh: 1.05, weight: 700 }
      h2: { size: 40px, lh: 1.15, weight: 600 }
      h3: { size: 28px, lh: 1.25, weight: 600 }
      body: { size: 18px, lh: 1.5, weight: 400 }
      small: { size: 14px, lh: 1.45, weight: 400 }

  spacing:
    base_unit: 4px
    scale: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration_short: 150ms
    duration_med: 300ms
    easing_default: cubic-bezier(0.4, 0, 0.2, 1)

  dark_mode: auto
