# Brand tokens — fixture. OKLCH color space (perceptually uniform).
# Maps to Next.js + shadcn: app/globals.css :root + .dark CSS variables
# AND `@theme inline` declarations for Tailwind utility classes.

tokens:
  colors:
    # Semantic shadcn token surface (the agent maps these to shadcn's --background, --foreground, etc.)
    background: "oklch(100% 0 0)"
    foreground: "oklch(15% 0 0)"
    primary: "oklch(64% 0.18 30)"
    primary_foreground: "oklch(98% 0 0)"
    muted: "oklch(96% 0 0)"
    muted_foreground: "oklch(45% 0 0)"
    semantic_error: "oklch(60% 0.20 25)"
    ring: "oklch(64% 0.18 30)"

  typography:
    display: "Fraunces, serif"
    body: "Inter, sans-serif"
    scale:
      h1: { size: "64px", lh: 1.0, weight: 700 }
      h2: { size: "40px", lh: 1.1, weight: 600 }
      body: { size: "18px", lh: 1.5, weight: 400 }

  spacing:
    base_unit: "4px"
    scale: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration_med: "300ms"
    easing_default: "cubic-bezier(0.4, 0, 0.2, 1)"

  radii:
    sm: "4px"
    md: "8px"
    lg: "12px"

  dark_mode: auto   # respect prefers-color-scheme; .dark class also supported
