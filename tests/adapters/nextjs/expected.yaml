# expected.yaml — Next.js + shadcn adapter expected per-phase output.
# Schema per tests/adapters/README.md §"expected.yaml".
# Adapter under test: adapters/stack-nextjs.md

fixture_baseline: phase-11-complete

# What the adapter SHOULD produce at each downstream pipeline phase
# when fed the fixture's .website-builder/ state.
expected_per_phase:

  phase_12_cms:
    # Per adapters/stack-nextjs.md §"CMS pairing" Default-for-muggle logic:
    # 5 pages + transactional:false + small editorial team → "none" (file-based MDX)
    cms_recommendation: none
    confidence: high
    alternatives_surfaced: [decap, payload]   # adapter surfaces both with trade-offs
    rationale: |
      5-page site, content-light, no editorial team — file-based MDX is enough.
      Decap surfaced as upgrade path (git-backed admin UI) — note Decap is in
      maintenance mode; agent surfaces Sveltia / Static CMS as active forks.
      Payload surfaced for content-heavy pivot, but YAGNI for 5 pages.
    i18n_strategy_lock: pattern-a   # shared structure, translated prose (decision 39 default)

  phase_17_design_system:
    # Per adapters/stack-nextjs.md §"Component library pairing" → Tokens section
    tokens_written_to:
      - brand.yaml                    # canonical source preserved
      - app/globals.css               # OKLCH :root + .dark + @theme inline
      - components.json               # cssVariables: true; baseColor: neutral
    css_pattern: oklch_with_theme_inline
    drift_check: pass   # no token drift; globals.css fully derived from brand.yaml
    custom_token_handling: |
      Custom colors (semantic_error, ring) declared in :root/.dark, mapped via
      @theme inline { --color-semantic-error: var(--semantic-error) } so they
      become Tailwind utility classes automatically.

  phase_18_component_build:
    components_generated: [HeroBlock, NavBar, FooterBlock, LanguageSwitcher]
    # LanguageSwitcher generated additionally because fixture is multilingual
    # (en + de) — see i18n/language-switcher.md#next-js--shadcn inline-variant.
    output_paths:
      HeroBlock: components/HeroBlock.tsx
      NavBar: components/NavBar.tsx
      FooterBlock: components/FooterBlock.tsx
      LanguageSwitcher: components/LanguageSwitcher.tsx
    shadcn_primitives_installed:
      - button         # for HeroBlock CTA + LanguageSwitcher inline variant
      - dropdown-menu  # for LanguageSwitcher dropdown variant (≥4 langs) — installed for future-proofing
      - sheet          # for NavBar mobile hamburger drawer
    server_client_boundary:
      HeroBlock: server
      NavBar: server   # outer shell; LanguageSwitcher is the Client island
      FooterBlock: server
      LanguageSwitcher: client   # 'use client' at file top per discipline
    rsc_directive_placement: line_1_before_imports   # enforced
    palette_validator: pass
    a11y_audit: pass
    expected_imports:
      next_intl: ["useTranslations", "useLocale"]
      next_intl_navigation: ["Link", "usePathname"]   # from custom @/i18n/navigation
      shadcn: ["Button", "DropdownMenu*", "Sheet*"]

  phase_22_i18n:
    # Fixture has en + de → multilingual checks active
    hreflang_emitted: true
    hreflang_codes: [en, de-CH, x-default]   # language_regions config applied per fixture
    hreflang_reciprocity: pass
    language_switcher_added: true
    language_switcher_variant: inline   # 2 locales → inline per i18n/language-switcher.md#next-js--shadcn
    language_switcher_min_target_size: 44px   # WCAG 2.2 SC 2.5.8 enforced
    rtl_handling: n_a   # fixture has en + de only (both LTR)
    locale_persistence: cookie_plus_localStorage   # see i18n/language-switcher.md persistence pattern

  phase_26_seo:
    # Per adapters/stack-nextjs.md §"Deploy" → Phase 26 cross-cut + i18n/hreflang.md verification
    hreflang_verification_pass: true
    sitemap_xml_generated: true
    sitemap_locales_covered: 2   # en + de variants per page
    canonical_url_per_page: set
    robots_txt_generated: true

  phase_28_deploy:
    target: vercel
    dns_handoff_ready: true
    ssl_strategy: vercel_lets_encrypt_auto
    custom_domain_via_mcp: true
    env_vars_propagated:
      - NEXT_PUBLIC_CANONICAL_HOST    # for hreflang absolute URLs
    cms_specific_build_command: false   # cms: none → standard `next build`
    # If cms were Payload, expected build command would be `pnpm payload migrate && next build`

  phase_29_deploy_verification:
    playwright_walk_pass: true
    pages_walked: 10   # 5 pages × 2 locales
    hreflang_curl_check_pass: true
    language_switcher_walk_pass: true

  phase_30_analytics:
    vercel_analytics_enabled: true
    vercel_speed_insights_enabled: true
    third_party_analytics: plausible   # muggle-default privacy posture per adapter §"Deploy" → Phase 30
    sitemap_submitted: [google_search_console, bing_webmaster]

# What the adapter SHOULD surface as cannot-do (verbatim from §"Limitations + escape hatches")
expected_limitations:
  - "No visual canvas — users edit MDX directly or use a CMS"
  - "Complex routing requires App Router conventions (catch-all, parallel, intercepting)"
  - "Server-side complexity when adding Route Handlers / DB / auth"
  - "Next.js 15 fetch no-store default is a footgun migrating from 14"
  - "Vercel pricing at scale (Hobby tier 100GB bandwidth cap)"
  - "shadcn lock-in to Tailwind"
  - "Copy-paste shadcn means the repo grows per component"

# What failure paths the adapter handles (verbatim from §"Limitations" → ### Failure modes table)
expected_failure_modes_covered:
  - "Hydration mismatch (Server vs Client output divergence)"
  - "'use client' directive ignored (placed after imports)"
  - "next-intl useTranslations 'No intl context' (missing provider boundary)"
  - "OKLCH unsupported in old browsers (Safari < 15.4) — sRGB fallback via color-mix()"
  - "Stripe webhook signature verification failed (raw body vs parsed)"
  - "Payload admin not loading post-deploy (missed `pnpm payload migrate`)"
  - "sitemap.ts empty (missing generateStaticParams for dynamic routes)"
  - "Vercel deploy `pnpm install` failure (lockfile / private dep auth)"
  - "next/image 504 (missing images.remotePatterns)"
  - "hreflang missing on prod (incorrect generateMetadata pattern)"

# Schema-conformance assertion (cross-references adapters/README.md)
schema_compliance:
  fourteen_h2_sections_in_order: true
  content_layer_mapping_table_row_labels:
    - "L1 brand.yaml.tokens"
    - "L2 sitemap.yaml + sections.yaml"
    - "L3 strings/{lang}.json"
    - "L4 content/pages/*.md"
    - "L5 briefs/{component}.json"
  identity_h3_present_in_mental_model: true
  crud_vocabulary_h3_present_in_auth_setup: true
  failure_modes_h3_present_in_limitations: true
  i18n_cross_refs:
    - i18n/language-switcher.md#next-js--shadcn
    - i18n/hreflang.md#next-js--shadcn
  per_stack_codegen_cross_ref: skills/wb-component-build/references/per-stack-codegen.md#nextjs
  context7_freshness_pattern_present: true
  context7_primary_id: /vercel/next.js
  context7_secondary_ids:
    - /shadcn-ui/ui
    - /tailwindlabs/tailwindcss.com
    - /payloadcms/payload
    - /radix-ui/primitives
  next_js_15_fetch_breaking_change_surfaced: true   # the Lock-3 canonical example
  re_fetch_threshold_documented: "30 days"
