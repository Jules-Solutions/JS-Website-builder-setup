# Synthetic .website-builder/brand.yaml — exercises L1 → theme.json v3 mapping.
# Colors: 3 — primary + neutral_900 + neutral_50; map to theme.json settings.color.palette[].
# Typography: 2 font families (display + body) + 3-scale (h1, h2, body) with fluid mins/maxes.
# Spacing: 5-step scale; map to theme.json settings.spacing.spacingSizes[].

tokens:
  colors:
    primary: oklch(64% 0.18 30)
    neutral_900: oklch(15% 0 0)
    neutral_50: oklch(98% 0 0)

  typography:
    display: "Fraunces, serif"
    body: "Inter, sans-serif"
    scale:
      h1:
        size: 64px
        size_min: 40px   # fluid typography min for mobile_360
        size_max: 64px   # fluid typography max for desktop_1280
        lh: 1.0
        weight: 700
      h2:
        size: 40px
        size_min: 28px
        size_max: 40px
        lh: 1.1
        weight: 600
      body:
        size: 18px
        size_min: 16px
        size_max: 18px
        lh: 1.5
        weight: 400

  spacing:
    base_unit: 4px
    scale: [0, 4, 8, 16, 32]   # 5 steps → theme.json spacingSizes[]

  motion:
    duration_med: 300ms
    easing_default: cubic-bezier(0.4, 0, 0.2, 1)
    preference: subtle

  dark_mode: auto
