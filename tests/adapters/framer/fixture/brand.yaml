# Layer 1 — Design tokens (per DESIGN-content-layers.md)
# Migrates to: Framer Color Styles (colors) + Text Styles (typography)
#              + code/tokens.ts (spacing + motion — no Framer first-class equivalent)

tokens:
  colors:
    primary: oklch(64% 0.18 30)
    neutral_900: oklch(15% 0 0)
    neutral_50: oklch(98% 0 0)
    semantic_error: oklch(60% 0.20 25)

  typography:
    display: "Fraunces, serif"
    body: "Inter, sans-serif"
    scale:
      h1: { size: 64px, lh: 1.0, weight: 700 }
      h2: { size: 40px, lh: 1.1, weight: 600 }
      body: { size: 18px, lh: 1.5, weight: 400 }

  spacing:
    base_unit: 4px
    scale: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration_med: 300ms
    easing_default: cubic-bezier(0.4, 0, 0.2, 1)

  dark_mode: auto
