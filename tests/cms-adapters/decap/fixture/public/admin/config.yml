# tests/cms-adapters/decap/fixture/public/admin/config.yml
# The Decap admin master config. Generated by the agent at phase 12 from sitemap.yaml + components.yaml + project.yaml.
#
# Note: this fixture is SHAPE-VALID but OAuth is NOT actually wired (no real GitHub OAuth App, no real repo).
# Phase 4 manual verification = config is well-formed YAML + Decap admin would load.
# Phase 5+ runner integration is the layer that wires real OAuth + a sandbox repo.

backend:
  name: github
  repo: jules-solutions/synthetic-decap-fixture   # synthetic; not a real repo
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/_astro/uploads"

publish_mode: simple   # not editorial_workflow in this fixture; phase-12 may enable it post-decision

# i18n per Decision 39 Pattern A — multiple_files (post.en.md / post.de.md)
i18n:
  structure: multiple_files
  locales: [en, de]
  default_locale: en

collections:
  # ----- Pages collection (L2 sitemap + L4 prose) -----
  - name: pages
    label: Pages
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    i18n: true   # inherit top-level i18n
    fields:
      - { name: title, label: Title, widget: string, i18n: true }
      - { name: slug, label: Slug, widget: string, i18n: duplicate }
      - name: layout
        label: Layout
        widget: list
        i18n: duplicate              # Decision 39 Pattern A: shared layout structure, translated text inside blocks
        types:
          - name: hero
            label: Hero
            widget: object
            summary: '{{fields.headline}}'
            fields:
              - { name: headline, widget: string, i18n: true }
              - { name: sub, widget: text, i18n: true }
              - { name: cta_label, widget: string, i18n: true }
              - { name: cta_href, widget: string, i18n: duplicate }
              - { name: background, widget: image, required: false }
              - { name: variant, widget: select, options: [text-left, text-center, image-right], default: text-left, i18n: duplicate }
          - name: rich_text
            label: "Rich Text"
            widget: object
            fields:
              - { name: body, widget: markdown, i18n: true }
          - name: cta
            label: CTA
            widget: object
            fields:
              - { name: headline, widget: string, i18n: true }
              - { name: sub, widget: text, i18n: true }
              - { name: button_label, widget: string, i18n: true }
              - { name: button_href, widget: string, i18n: duplicate }

  # ----- Strings collection (L3 — per-locale UI strings) -----
  - name: strings
    label: "UI Strings"
    files:
      - name: en
        label: "Strings (English)"
        file: "src/content/_data/strings.en.json"
        fields:
          - name: nav
            label: Navigation
            widget: object
            fields:
              - { name: home, widget: string }
              - { name: about, widget: string }
              - { name: blog, widget: string }
              - { name: contact, widget: string }
              - { name: language_switcher_label, widget: string }
          - name: cta
            label: "Call to action"
            widget: object
            fields:
              - { name: primary_button, widget: string }
              - { name: secondary_button, widget: string }
              - { name: contact_button, widget: string }
          - name: errors
            label: Errors
            widget: object
            fields:
              - { name: form_required, widget: string }
              - { name: form_invalid_email, widget: string }
              - { name: form_submission_failed, widget: string }
      - name: de
        label: "Strings (Deutsch)"
        file: "src/content/_data/strings.de.json"
        fields:
          - name: nav
            label: Navigation
            widget: object
            fields:
              - { name: home, widget: string }
              - { name: about, widget: string }
              - { name: blog, widget: string }
              - { name: contact, widget: string }
              - { name: language_switcher_label, widget: string }
          - name: cta
            label: "Call to action"
            widget: object
            fields:
              - { name: primary_button, widget: string }
              - { name: secondary_button, widget: string }
              - { name: contact_button, widget: string }
          - name: errors
            label: Errors
            widget: object
            fields:
              - { name: form_required, widget: string }
              - { name: form_invalid_email, widget: string }
              - { name: form_submission_failed, widget: string }
