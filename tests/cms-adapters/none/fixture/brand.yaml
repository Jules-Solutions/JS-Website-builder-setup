---
# tests/cms-adapters/none/fixture/brand.yaml
# Layer-1 design tokens. Minimal palette + type scale + spacing + motion per
# tests/cms-adapters/README.md § "Minimum contents per CMS" → fixture/.

tokens:
  colors:
    # 3-color palette (background-foreground + brand + accent)
    background: oklch(99% 0 0)
    foreground: oklch(15% 0 0)
    primary: oklch(64% 0.18 30)
    primary_foreground: oklch(98% 0 0)
    accent: oklch(72% 0.12 200)
    semantic_error: oklch(60% 0.20 25)

  typography:
    display: "Fraunces, serif"
    body: "Inter, system-ui, sans-serif"
    scale:
      h1: { size: 56px, lh: 1.05, weight: 700 }
      h2: { size: 36px, lh: 1.2, weight: 600 }
      body: { size: 18px, lh: 1.55, weight: 400 }
      small: { size: 14px, lh: 1.45, weight: 400 }

  spacing:
    base_unit: 4px
    scale: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration_short: 150ms
    duration_med: 300ms
    easing_default: cubic-bezier(0.4, 0, 0.2, 1)

  dark_mode: auto
